appId: com.basketikun.infinitecanvas
productName: 眨眼之间工作台
copyright: Copyright © 2026 infinite-canvas contributors
electronVersion: 42.3.1
asar: true
npmRebuild: false
afterPack: desktop/app/after-pack.cjs

files:
    - main.cjs
    - after-pack.cjs
    - package.json

directories:
    output: ../../release

extraResources:
    - from: ../../build/desktop/bin
      to: bin
    - from: ../../build/desktop/web
      to: web
    - from: ../../build/desktop/manifest.json
      to: manifest.json

win:
    target:
        - target: nsis
          arch:
              - x64
    artifactName: ${productName}-${version}-Setup-${arch}.${ext}

mac:
    target:
        - target: dmg
          arch:
              - x64
              - arm64
    category: public.app-category.productivity
    identity: "-"
    gatekeeperAssess: false
    artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
    oneClick: false
    perMachine: false
    allowToChangeInstallationDirectory: true
    createDesktopShortcut: true
    createStartMenuShortcut: true
    shortcutName: 眨眼之间工作台
